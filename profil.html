<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRush-profile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/CSS/profil.css">
    <script src="assets/JS/profil.js" defer></script>
    <link rel="icon" href="assets/Images/logo.png">
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo"><img src="assets/Images/logo.png" alt="TypeRush Logo"></div>
            <span class="brand-name">Type<span>Rush</span></span>
            <a href="home.html"><button class="icon-btn"><i class="fa-solid fa-house"></i></button></a>
        </div>
       
        <div class="user-panel">
            <a href="index.html"><button class="icon-btn active"><i class="fa-solid fa-keyboard"></i></button></a>
            <button class="icon-btn" onclick="signOutUser()"><i class="fa-solid fa-right-from-bracket"></i></button>
            <div class="user-info">
                <div class="avatar">D</div>
                <a href="profil.html"><span class="user-name">demo</span></a>
                <span class="badge">3</span>
            </div>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-pic avatar">D</div>
            <div class="profile-details">
                <h2 class="username user-name">demo</h2>
                <p class="user-email" id="profile-email">email@example.com</p>
                <div class="user-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-high">0</span>
                        <span class="stat-name">Highest<br>WPM</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-avg">0</span>
                        <span class="stat-name">Average<br>WPM</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-low">0</span>
                        <span class="stat-name">Lowest<br>WPM</span>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="btn action-btn" onclick="signOutUser()"><i class="fa-solid fa-right-from-bracket"></i> Sign out</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="assets/JS/firebase-config.js"></script>
    <script src="assets/JS/auth.js"></script>
    <script>
        requireAuth("login.html");
        
        const scores = JSON.parse(localStorage.getItem('typerush_scores') || '[]');
        if (scores.length > 0) {
            const high = Math.max(...scores);
            const low = Math.min(...scores);
            const sum = scores.reduce((a, b) => a + b, 0);
            const avg = Math.round(sum / scores.length);
            
            document.getElementById('stat-high').textContent = high;
            document.getElementById('stat-low').textContent = low;
            document.getElementById('stat-avg').textContent = avg;
        }
    </script>
</body>
</html>
